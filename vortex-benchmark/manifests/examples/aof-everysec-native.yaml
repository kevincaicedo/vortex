schema_version: 1
name: aof-everysec-native
description: Native Redis AOF everysec scenario used for overhead tracking in CI.
databases:
  - redis
backends:
  - redis-benchmark
commands:
  - GET
  - SET
  - INCR
duration: 20s
environment:
  mode: native
  port_base: 16479
resource_config:
  cpus: 4
  memory: 2g
  threads: 4
runtime_config:
  aof_enabled: true
  aof_fsync: everysec
  eviction_policy: noeviction
settings:
  redis-benchmark:
    requests: 150000
    clients: 50
    pipeline: 16
    keyspace_size: 250000