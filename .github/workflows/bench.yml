name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Criterion Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-15

      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          cargo bench -p vortex-engine --bench engine -- --output-format bencher --sample-size 20 --measurement-time 3 --warm-up-time 1 | tee bench-output.txt
          cargo bench -p vortex-engine --bench table -- --output-format bencher --sample-size 20 --measurement-time 3 --warm-up-time 1 | tee bench-output.txt
          cargo bench -p vortex-bench --benches -- --output-format bencher --sample-size 20 --measurement-time 3 --warm-up-time 1 | tee -a bench-output.txt

      - name: Ensure gh-pages branch exists
        id: ensure-gh-pages
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$GITHUB_EVENT_NAME" != "push" ]]; then
            echo "::warning::gh-pages branch does not exist yet; skipping benchmark upload for this run"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Creating gh-pages branch for benchmark tracking"
          EMPTY_TREE=$(git hash-object -t tree /dev/null)
          COMMIT=$(
            printf 'Initialize benchmark data\n' | \
              env \
                GIT_AUTHOR_NAME='github-actions[bot]' \
                GIT_AUTHOR_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
                GIT_COMMITTER_NAME='github-actions[bot]' \
                GIT_COMMITTER_EMAIL='41898282+github-actions[bot]@users.noreply.github.com' \
                git commit-tree "$EMPTY_TREE"
          )
          git push origin "$COMMIT":refs/heads/gh-pages
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Store benchmark result
        if: steps.ensure-gh-pages.outputs.ready == 'true'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: VortexDB Benchmarks
          tool: 'cargo'
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: "105%"
          fail-on-alert: true
          alert-comment-cc-users: "@${{ github.actor }}"
          auto-push: ${{ github.event_name == 'push' }}
          save-data-file: true
