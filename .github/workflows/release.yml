name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: vortex-server
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: vortex-server
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            binary: vortex-server
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: vortex-server

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-15
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin vortex-server --bin vortex-cli
          else
            cargo build --release --target ${{ matrix.target }} --bin vortex-server --bin vortex-cli
          fi

      - name: Package artifacts
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="vortexdb-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp target/${{ matrix.target }}/release/vortex-server "${ARCHIVE}/"
          cp target/${{ matrix.target }}/release/vortex-cli "${ARCHIVE}/"
          cp README.md LICENSE* "${ARCHIVE}/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            vortexdb-*.tar.gz
            vortexdb-*.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vortexdb-*.tar.gz
            vortexdb-*.sha256
