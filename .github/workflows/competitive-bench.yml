name: Competitive Benchmark

on:
  push:
    branches: [main]
  schedule:
    # Run weekly on Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      requests:
        description: "Number of requests per test"
        default: "500000"
        type: string
      runs:
        description: "Number of benchmark runs for averaging"
        default: "3"
        type: string
      custom:
        description: "Run custom command benchmarks"
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pages: write

concurrency:
  group: competitive-bench
  cancel-in-progress: true

jobs:
  compare:
    name: VortexDB vs Redis vs Valkey vs Dragonfly
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      redis:
        image: redis:8-alpine
        ports: ["16379:6379"]
        options: --memory=2g --cpus=2
      valkey:
        image: valkey/valkey:9-alpine
        ports: ["16380:6379"]
        options: --memory=2g --cpus=2
      dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        ports: ["16381:6379"]
        options: --memory=2g --cpus=2

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-15

      - uses: Swatinem/rust-cache@v2

      - name: Install redis-tools and memtier_benchmark
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools bc lsb-release curl gpg
          curl -fsSL https://packages.redis.io/gpg | sudo gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/redis.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y memtier-benchmark

      - name: Wait for services
        run: |
          for port in 16379 16380 16381; do
            for i in {1..30}; do
              redis-cli -p $port PING >/dev/null 2>&1 && break
              sleep 1
            done
          done

      - name: Build VortexDB
        run: cargo build --release --bin vortex-server

      - name: Start VortexDB
        run: |
          ./target/release/vortex-server --bind "127.0.0.1:16382" &
          VORTEX_PID=$!
          echo "VORTEX_PID=$VORTEX_PID" >> $GITHUB_ENV
          sleep 2
          redis-cli -p 16382 PING

      - name: Run compare.sh v2 (standard + custom + memtier)
        run: |
          REQUESTS="${{ inputs.requests || '500000' }}"
          RUNS="${{ inputs.runs || '3' }}"
          CUSTOM_FLAG=""
          if [[ "${{ inputs.custom || 'true' }}" == "true" ]]; then
            CUSTOM_FLAG="--custom"
          fi

          bash scripts/compare.sh \
            -n "$REQUESTS" \
            -c 50 \
            -P 16 \
            --no-build \
            --no-docker \
            --json \
            --markdown \
            --latency \
            --runs "$RUNS" \
            --memtier \
            $CUSTOM_FLAG \
            2>&1 | tee compare-output.txt || true

          # compare.sh writes to benchmarks/ — copy for artifact upload
          cp benchmarks/results-*.json results.json 2>/dev/null || true
          cp benchmarks/results-*.md results.md 2>/dev/null || true

      - name: Run internal Criterion benchmarks
        run: |
          echo "" >> results.md
          echo "## Internal Criterion Benchmarks" >> results.md
          echo "" >> results.md
          cargo bench -p vortex-bench --bench engine -- --output-format bencher 2>/dev/null | tee /tmp/criterion.txt
          echo '```' >> results.md
          cat /tmp/criterion.txt >> results.md
          echo '```' >> results.md

      - name: Stop VortexDB
        if: always()
        run: kill $VORTEX_PID 2>/dev/null || true

      - name: Upload results (Markdown)
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-md-${{ github.run_id }}
          path: results.md

      - name: Upload results (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-json-${{ github.run_id }}
          path: results.json

      - name: Upload full output log
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output-${{ github.run_id }}
          path: compare-output.txt

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          # Copy latest results into docs/ for Pages publishing
          mkdir -p docs/benchmarks
          cp results.json docs/benchmarks/latest.json 2>/dev/null || true
          cp results.md docs/benchmarks/latest.md 2>/dev/null || true
          # Archive with timestamp
          TIMESTAMP=$(date +%Y%m%d)
          cp results.json "docs/benchmarks/results-${TIMESTAMP}.json" 2>/dev/null || true

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: benchmarks
          keep_files: true

      - name: Post results to issue
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('results.md', 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly Benchmark Report — ${date}`,
              body: body,
              labels: ['benchmarks'],
            });
