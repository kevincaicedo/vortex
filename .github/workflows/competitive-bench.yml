name: Competitive Benchmark

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/competitive-bench.yml
      - vortex-benchmark/**
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - Dockerfile
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: competitive-bench
  cancel-in-progress: true

env:
  BENCH_ROOT: ${{ runner.temp }}/vortex-benchmark-artifacts

jobs:
  benchmark:
    name: Competitive Benchmark Suite
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-15

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: competitive-bench

      - name: Install native benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc curl gpg lsb-release redis-server redis-tools
          curl -fsSL https://packages.redis.io/gpg | sudo gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/redis.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y memtier-benchmark

      - name: Install vortex_benchmark Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e vortex-benchmark/python

      - name: Build Vortex release binary
        run: cargo build --release --bin vortex-server

      - name: Run manifest-driven benchmark suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$BENCH_ROOT"

          run_manifest() {
            local manifest="$1"
            local state_file=""

            cleanup() {
              if [[ -n "$state_file" && -f "$state_file" ]]; then
                bash vortex-benchmark/bin/vortex_bench teardown --state-file "$state_file" || true
              fi
            }

            bash vortex-benchmark/bin/vortex_bench setup \
              --workload-manifest "$manifest" \
              --output-dir "$BENCH_ROOT"

            state_file="$(ls "$BENCH_ROOT"/environments/*.json | sort | tail -1)"
            trap cleanup RETURN

            bash vortex-benchmark/bin/vortex_bench run \
              --state-file "$state_file" \
              --workload-manifest "$manifest" \
              --output-dir "$BENCH_ROOT"

            trap - RETURN
            cleanup
          }

          run_manifest vortex-benchmark/manifests/examples/ci-regression-native.yaml
          run_manifest vortex-benchmark/manifests/examples/aof-everysec-native.yaml
          run_manifest vortex-benchmark/manifests/examples/eviction-allkeys-lru-native.yaml

          bash vortex-benchmark/bin/vortex_bench report \
            --results-dir "$BENCH_ROOT/results" \
            --output-dir "$BENCH_ROOT" \
            --title "Vortex Competitive Benchmark"

          archived_json="$(ls "$BENCH_ROOT"/reports/*_report.json | sort | tail -1)"
          stamp="$(basename "$archived_json" _report.json)"
          echo "BENCH_REPORT_STAMP=$stamp" >> "$GITHUB_ENV"
          echo "BENCH_LATEST_MARKDOWN=$BENCH_ROOT/reports/latest/report.md" >> "$GITHUB_ENV"

      - name: Upload benchmark report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports-${{ github.run_id }}
          path: ${{ env.BENCH_ROOT }}/reports

      - name: Stage Pages benchmark artifacts
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf docs/benchmarks/latest "docs/benchmarks/reports/${BENCH_REPORT_STAMP}"
          mkdir -p docs/benchmarks/latest "docs/benchmarks/reports/${BENCH_REPORT_STAMP}/assets"

          cp -R "$BENCH_ROOT/reports/latest/." docs/benchmarks/latest/
          cp "$BENCH_ROOT/reports/index.json" docs/benchmarks/index.json
          cp "$BENCH_ROOT/reports/${BENCH_REPORT_STAMP}_report.json" "docs/benchmarks/reports/${BENCH_REPORT_STAMP}/report.json"
          cp "$BENCH_ROOT/reports/${BENCH_REPORT_STAMP}_report.csv" "docs/benchmarks/reports/${BENCH_REPORT_STAMP}/report.csv"
          cp "$BENCH_ROOT/reports/${BENCH_REPORT_STAMP}_report.md" "docs/benchmarks/reports/${BENCH_REPORT_STAMP}/report.md"
          cp -R "$BENCH_ROOT/reports/${BENCH_REPORT_STAMP}_assets/." "docs/benchmarks/reports/${BENCH_REPORT_STAMP}/assets/"

      - name: Deploy benchmark Pages content
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/benchmarks
          destination_dir: benchmarks
          keep_files: true

      - name: Post weekly benchmark report issue
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.BENCH_LATEST_MARKDOWN, 'utf8');
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Benchmark Report — ${date}`,
              body,
              labels: ['benchmarks'],
            });
